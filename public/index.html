<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="theme-color" content="#03010a"/>
  <meta name="description" content="Pala Bhargav — SDE Intern at Infosys. Full-stack developer. Open to Work."/>
  <title>Pala Bhargav | Developer Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:#03010a;color:#e2e8f0;font-family:'DM Sans',system-ui,sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:#03010a}
    ::-webkit-scrollbar-thumb{background:linear-gradient(#8b5cf6,#06b6d4);border-radius:3px}
    ::selection{background:rgba(139,92,246,0.4);color:#fff}
    /* LOADER */
    #loader{position:fixed;inset:0;background:#03010a;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;transition:opacity 0.6s ease,visibility 0.6s ease}
    #loader.hidden{opacity:0;visibility:hidden}
    .loader-ring{width:60px;height:60px;border-radius:50%;border:2px solid rgba(139,92,246,0.15);border-top-color:#8b5cf6;animation:spin 1s linear infinite}
    .loader-text{font-family:'Fira Code',monospace;font-size:0.8rem;color:#8b5cf6;letter-spacing:0.2em;animation:pulse 1.5s ease infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:0.5}50%{opacity:1}}
  </style>
</head>
<body>
  <div id="loader">
    <div class="loader-ring"></div>
    <span class="loader-text">initializing...</span>
  </div>
  <div id="root"></div>
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('loader').classList.add('hidden');
      }, 800);
    });
  </script>
</body>
</html>
